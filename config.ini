[tunnel]
server = <EasyTier Server>
network_name = <EasyTier Network>
network_password = <EasyTier Password>
listen_ip = dhcp

[driver]
srv_path = usb\usbredirectorsrv.exe
cli_path = usb\usbrdrsh.exe
installer_path = usb\usbredirector-installer.exe

[server]
enable_easytier = false
default_shared =
auto_connect = true

[client]
enable_easytier = false
usb_server_host = 127.0.0.1
usb_server_port = 32032
default_connect =
auto_connect = false

[config]
allow_client_view = true
allow_client_modify = true
max_log_lines = 5000
status_refresh_interval = 3
